<!DOCTYPE html>
<html>
<head>
  <title>Advanced Backup System</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      color: brawn;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    .update { background: #007bff; }
    .backup { background: #28a745; }
    .download { background: orange; }

    #logs {
      text-align: left;
      max-height: 150px;
      overflow-y: auto;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>☁️ ,Advanced Cloud Backup</h1>

<div class="box">
  <p><b>Primary Data</b></p>
  <p id="data">Version 1</p>
</div>

<p id="status">Status: Waiting...</p>

<div>
  <button class="update" onclick="updateData()">Update Data</button>
  <button class="backup" onclick="backup()">Run Backup</button>
  <button class="download" onclick="downloadLogs()">Download Logs</button>
</div>

<div class="box">
  <h3>Backup Logs</h3>
  <div id="logs"></div>
</div>

<script>
let version = 1;
let logs = [];

function updateData() {
  version++;
  document.getElementById("data").innerHTML = "Version " + version;
  document.getElementById("status").innerHTML = "Data Updated ⚡";
}

function backup() {
  let data = document.getElementById("data").innerText;
  let now = new Date().toLocaleString();

  // 🔥 إنشاء ملف باسم الوقت
  let filename = "backup_" + Date.now() + ".txt";

  let blob = new Blob([data], { type: "text/plain" });
  let link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();

  // 🔥 تسجيل العملية
  let log = "Backup created: " + filename + " at " + now;
  logs.push(log);

  let logDiv = document.getElementById("logs");
  logDiv.innerHTML += "<p>" + log + "</p>";

  document.getElementById("status").innerHTML = "Backup Created ✅";
}

// تحميل السجل
function downloadLogs() {
  let content = logs.join("\n");

  let blob = new Blob([content], { type: "text/plain" });
  let link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "logs.txt";
  link.click();
}
</script>

</body>
</html>
