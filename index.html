<!DOCTYPE html>
<html>
<head>
  <title>Real Backup System</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      color: black;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    .update { background: #007bff; }
    .backup { background: #28a745; }
  </style>
</head>

<body>

<h1>☁️ Real Cloud Backup Simulation</h1>

<div class="box">
  <p><b>Primary Data</b></p>
  <p id="data">Version 1</p>
</div>

<p id="status">Status: Waiting...</p>

<button class="update" onclick="updateData()">Update Data</button>
<button class="backup" onclick="backup()">Run Backup</button>

<script>
let version = 1;

function updateData() {
  version++;
  document.getElementById("data").innerHTML = "Version " + version;
  document.getElementById("status").innerHTML = "Data Updated ⚡";
}

function backup() {
  let data = document.getElementById("data").innerText;

  // 🔥 إنشاء ملف حقيقي
  let blob = new Blob([data], { type: "text/plain" });
  let link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "backup.txt";
  link.click();

  document.getElementById("status").innerHTML = "Backup File Downloaded ✅";
}
</script>

</body>
</html>
