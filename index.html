<!DOCTYPE html>
<html>
<head>
  <title>Cloud Backup Application</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      margin: auto;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .logs, .cloud {
      background: white;
      color: black;
      padding: 10px;
      border-radius: 10px;
      width: 300px;
      margin: 20px auto;
      height: 150px;
      overflow-y: scroll;
      text-align: left;
    }
  </style>
</head>

<body>

<h1>☁️ Cloud Backup Application</h1>

<p id="time"></p>

<div class="card">
  <h3>Primary Data</h3>
  <p id="version">Version 1</p>

  <p id="status">Primary Region: 🟢 Online</p>
  <p id="backupStatus">Backup Region: 🟢 Ready</p>
</div>

<button onclick="updateData()">Update Data</button>
<button onclick="runBackup()">Run Backup (Upload)</button>
<button onclick="simulateFailure()">Simulate Failure</button>
<button onclick="restoreBackup()">Restore</button>
<button onclick="loadBackups()">Show Cloud Data</button>

<div class="logs" id="logs">
  <h3>Logs</h3>
</div>

<div class="cloud" id="cloudData">
  <h3>Cloud Backups</h3>
</div>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDtpInC0JbD1cSWnJXhcbRPPRpuOpDIPD4",
  authDomain: "cloud-backup-28852.firebaseapp.com",
  projectId: "cloud-backup-28852",
  storageBucket: "cloud-backup-28852.firebasestorage.app",
  messagingSenderId: "444505696287",
  appId: "1:444505696287:web:413222970825ee48434d2a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let version = 1;

// وقت حي
setInterval(() => {
  document.getElementById("time").textContent =
    "Current Time: " + new Date().toLocaleString();
}, 1000);

// تحديث البيانات
function updateData() {
  version++;
  document.getElementById("version").textContent = "Version " + version;
  addLog("Data updated to version " + version);
}

// رفع للسحابة
function runBackup() {
  const time = new Date().toLocaleString();

  document.getElementById("backupStatus").textContent = "Uploading... 🔄";

  setTimeout(() => {
    db.collection("backups").add({
      version: version,
      time: time
    });

    document.getElementById("backupStatus").textContent = "Saved ☁️";

    addLog("Backup uploaded to cloud at " + time);
  }, 1500);
}

// فشل + تحويل
function simulateFailure() {
  document.getElementById("status").textContent = "Primary Failed 🔴";
  document.getElementById("backupStatus").textContent = "Backup Running 🟡";

  setTimeout(() => {
    document.getElementById("backupStatus").textContent = "Backup Active 🟢";
    addLog("Failover activated");
  }, 2000);
}

// استرجاع
function restoreBackup() {
  db.collection("backups")
    .orderBy("time", "desc")
    .limit(1)
    .get()
    .then((snapshot) => {
      if (!snapshot.empty) {
        const data = snapshot.docs[0].data();

        version = data.version;
        document.getElementById("version").textContent = "Version " + version;
        document.getElementById("status").textContent = "Restored 🟢";

        addLog("Restored from cloud");
      }
    });
}

// عرض البيانات من السحابة
function loadBackups() {
  const container = document.getElementById("cloudData");
  container.innerHTML = "<h3>Cloud Backups</h3>Loading...";

  db.collection("backups")
    .orderBy("time", "desc")
    .get()
    .then((snapshot) => {
      container.innerHTML = "<h3>Cloud Backups</h3>";

      snapshot.forEach((doc) => {
        const data = doc.data();

        const p = document.createElement("p");
        p.textContent = "Version: " + data.version + " | Time: " + data.time;

        container.appendChild(p);
      });
    });
}

// Logs
function addLog(text) {
  const logBox = document.getElementById("logs");
  const p = document.createElement("p");
  p.textContent = text;
  logBox.appendChild(p);
}
</script>

</body>
</html>
