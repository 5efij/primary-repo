<!DOCTYPE html>
<html>
<head>
  <title>Cloud Backup System</title>

  <style>
    body {
      font-family: Arial;
      background-color: #eef2f7;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 350px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .update { background-color: #007bff; }
    .backup { background-color: #28a745; }
    .fail { background-color: red; }

    /* 🔥 حركة النقل */
    #transfer {
      margin: 20px;
      font-weight: bold;
      color: green;
      display: none;
      animation: move 1s linear infinite;
    }

    @keyframes move {
      0% { transform: translateX(-20px); }
      50% { transform: translateX(20px); }
      100% { transform: translateX(-20px); }
    }

  </style>

</head>

<body>

<h1>Multi-Region Backup System</h1>

<!-- Primary -->
<div class="box">
  <p><b>Primary Region (Iraq)</b></p>
  <p id="data">Data: Version 1</p>
</div>

<!-- Animation -->
<div id="transfer">⬅️ Transferring Data ➡️</div>

<!-- Backup -->
<div class="box">
  <p><b>Backup Region (Europe)</b></p>
  <p id="backup">Data: Not Synced ❌</p>
</div>

<!-- Status -->
<p id="status">Status: Waiting...</p>
<p>Last Backup: <span id="time">-</span></p>

<!-- Buttons -->
<button class="update" onclick="updateData()">Update Data</button>
<button class="backup" onclick="backup()">Run Backup</button>
<button class="fail" onclick="failSystem()">Simulate Failure</button>

<script>
let version = 1;

// تحديث البيانات
function updateData() {
  version++;
  document.getElementById("data").innerHTML = "Data: Version " + version;
  document.getElementById("status").innerHTML = "Status: Data Updated ⚡";
}

// النسخ الاحتياطي + الحركة
function backup() {
  var transfer = document.getElementById("transfer");
  transfer.style.display = "block";

  setTimeout(function() {
    var data = document.getElementById("data").innerHTML;

    document.getElementById("backup").innerHTML = data + " ✅";
    document.getElementById("status").innerHTML = "Status: Data Synced ✔️";

    var now = new Date();
    document.getElementById("time").innerHTML = now.toLocaleString();

    transfer.style.display = "none";
  }, 1500);
}

// فشل النظام
function failSystem() {
  document.getElementById("status").innerHTML = "Primary Failed ❌ Switching to Backup ⚠️";
  document.getElementById("backup").innerHTML += " (Active Now)";
}
</script>

</body>
</html>
