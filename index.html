<!DOCTYPE html>
<html>
<head>
  <title>Advanced Cloud Backup</title>
  <style>
    body {
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      margin: auto;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn1 { background: #3498db; color: white; }
    .btn2 { background: #2ecc71; color: white; }
    .btn3 { background: #f39c12; color: white; }
    .btn4 { background: #e74c3c; color: white; }

    .logs {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 15px;
      width: 300px;
      margin: 20px auto;
      height: 150px;
      overflow-y: scroll;
      text-align: left;
    }
  </style>
</head>

<body>

  <h1>☁️ Advanced Cloud Backup</h1>

  <div class="card">
    <h3>Primary Data</h3>
    <p id="version">Version 4</p>

    <p id="status">Primary Region: 🟢 Online</p>
    <p id="backupStatus">Backup Region: 🟢 Synced</p>
  </div>

  <p>Backup Created ✅</p>

  <button class="btn1" onclick="updateData()">Update Data</button>
  <button class="btn2" onclick="runBackup()">Run Backup</button>
  <button class="btn3" onclick="downloadLogs()">Download Logs</button>
  <button class="btn4" onclick="simulateFailure()">Simulate Failure</button>

  <div class="logs" id="logs">
    <h3>Backup Logs</h3>
  </div>

<script>
let version = 4;

function updateData() {
  version++;
  document.getElementById("version").textContent = "Version " + version;

  const logBox = document.getElementById("logs");
  const time = new Date().toLocaleString();

  const log = document.createElement("p");
  log.textContent = "Data updated to Version " + version + " at " + time;
  logBox.appendChild(log);
}

function runBackup() {
  const logBox = document.getElementById("logs");
  const time = new Date().toLocaleString();

  document.getElementById("backupStatus").textContent = "Backup Region: 🔄 Syncing...";

  setTimeout(() => {
    document.getElementById("backupStatus").textContent = "Backup Region: 🟢 Synced";

    const newLog = document.createElement("p");
    newLog.textContent = "Backup created at " + time;
    logBox.appendChild(newLog);
  }, 1000);
}

function simulateFailure() {
  document.getElementById("status").textContent = "Primary Region: 🔴 Failed";
  document.getElementById("backupStatus").textContent = "Backup Region: 🟡 Taking Over";

  const logBox = document.getElementById("logs");
  const time = new Date().toLocaleString();

  const log = document.createElement("p");
  log.textContent = "FAILOVER: Backup took control at " + time;
  logBox.appendChild(log);
}

function downloadLogs() {
  const logs = document.getElementById("logs").innerText;
  const blob = new Blob([logs], { type: "text/plain" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "backup_logs.txt";
  a.click();
}
</script>

</body>
</html>
