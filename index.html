<!DOCTYPE html>
<html>
<head>
  <title>Cloud Backup System</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      margin: auto;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .logs {
      background: white;
      color: black;
      padding: 10px;
      border-radius: 10px;
      width: 300px;
      margin: 20px auto;
      height: 150px;
      overflow-y: scroll;
      text-align: left;
    }
  </style>
</head>

<body>

<h1>☁️ Cloud Backup System</h1>

<div class="card">
  <h3>Primary Data</h3>
  <p id="version">Version 1</p>

  <p id="status">Primary Region: 🟢 Online</p>
  <p id="backupStatus">Backup Region: 🟢 Ready</p>
</div>

<button onclick="updateData()">Update Data</button>
<button onclick="runBackup()">Run Backup (Online)</button>
<button onclick="simulateFailure()">Simulate Failure</button>

<div class="logs" id="logs">
  <h3>Logs</h3>
</div>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDtpInC0JbD1cSWnJXhcbRPPRpuOpDIPD4",
  authDomain: "cloud-backup-28852.firebaseapp.com",
  projectId: "cloud-backup-28852",
  storageBucket: "cloud-backup-28852.firebasestorage.app",
  messagingSenderId: "444505696287",
  appId: "1:444505696287:web:413222970825ee48434d2a"
};

// تشغيل Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// بيانات
let version = 1;

// تحديث البيانات
function updateData() {
  version++;
  document.getElementById("version").textContent = "Version " + version;

  addLog("Data updated to version " + version);
}

// نسخ احتياطي أونلاين
function runBackup() {
  const time = new Date().toLocaleString();

  db.collection("backups").add({
    version: version,
    time: time
  });

  document.getElementById("backupStatus").textContent = "Backup Region: ☁️ Saved Online";

  addLog("Backup saved ONLINE at " + time);
}

// محاكاة فشل
function simulateFailure() {
  document.getElementById("status").textContent = "Primary Region: 🔴 Failed";
  document.getElementById("backupStatus").textContent = "Backup Region: 🟡 Taking Over";

  addLog("System failure! Backup activated");
}

// إضافة Log
function addLog(text) {
  const logBox = document.getElementById("logs");
  const p = document.createElement("p");
  p.textContent = text;
  logBox.appendChild(p);
}
</script>

</body>
</html>
